openapi: 3.0.3
info:
  title: jma-openapi
  version: 0.1.0
  description: |
    気象庁防災情報 JSON を扱いやすい REST API として公開する非公式ラッパー API。
servers:
  - url: http://localhost:8080
    description: local
  - url: https://example.run.app
    description: cloud-run
tags:
  - name: health
  - name: areas
  - name: forecasts
paths:
  /healthz:
    get:
      tags: [health]
      operationId: getHealthz
      summary: Liveness check
      description: アプリケーション自身の liveness を返す。
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /v1/areas:
    get:
      tags: [areas]
      operationId: getV1Areas
      summary: List area metadata
      description: 気象庁の office 一覧を返す。`parent` 指定時は parent 一致のみ返す。
      parameters:
        - in: query
          name: parent
          schema:
            type: string
          required: false
          description: offices.parent でのフィルタ。
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AreasResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '502':
          $ref: '#/components/responses/ErrorResponse'
        '503':
          $ref: '#/components/responses/ErrorResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /v1/areas/{areaCode}:
    get:
      tags: [areas]
      operationId: getV1AreasAreaCode
      summary: Get a single area metadata
      description: 指定した office code の詳細を返す。
      parameters:
        - in: path
          name: areaCode
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Area'
        '404':
          $ref: '#/components/responses/ErrorResponse'
        '502':
          $ref: '#/components/responses/ErrorResponse'
        '503':
          $ref: '#/components/responses/ErrorResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /v1/forecasts/{officeCode}:
    get:
      tags: [forecasts]
      operationId: getV1ForecastsOfficeCode
      summary: Get forecast by office code
      description: 指定した office code の予報情報を返す。
      parameters:
        - in: path
          name: officeCode
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForecastResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'
        '502':
          $ref: '#/components/responses/ErrorResponse'
        '503':
          $ref: '#/components/responses/ErrorResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
components:
  responses:
    ErrorResponse:
      description: Error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
  schemas:
    HealthResponse:
      type: object
      required: [status, service, version, timestamp]
      properties:
        status:
          type: string
          example: ok
        service:
          type: string
          example: jma-openapi
        version:
          type: string
          example: 0.1.0
        timestamp:
          type: string
          format: date-time
    AreasResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Area'
    Area:
      type: object
      required: [code, name, enName, officeName, parent, children]
      properties:
        code:
          type: string
        name:
          type: string
        enName:
          type: string
        officeName:
          type: string
        parent:
          type: string
        children:
          type: array
          items:
            type: string
    ForecastResponse:
      type: object
      required: [office, publishingOffice, reportDatetime, weatherAreas, temperatureAreas]
      properties:
        office:
          $ref: '#/components/schemas/OfficeRef'
        publishingOffice:
          type: string
        reportDatetime:
          type: string
          format: date-time
        weatherAreas:
          type: array
          items:
            $ref: '#/components/schemas/WeatherArea'
        temperatureAreas:
          type: array
          items:
            $ref: '#/components/schemas/TemperatureArea'
    OfficeRef:
      type: object
      required: [code, name]
      properties:
        code:
          type: string
        name:
          type: string
    WeatherArea:
      type: object
      required: [code, name, timeSeries]
      properties:
        code:
          type: string
        name:
          type: string
        timeSeries:
          type: array
          items:
            $ref: '#/components/schemas/WeatherTimeSeriesEntry'
    WeatherTimeSeriesEntry:
      type: object
      required: [time]
      properties:
        time:
          type: string
          format: date-time
        weatherCode:
          type: string
          nullable: true
        weather:
          type: string
          nullable: true
        wind:
          type: string
          nullable: true
        wave:
          type: string
          nullable: true
        pop:
          type: string
          nullable: true
    TemperatureArea:
      type: object
      required: [code, name, timeSeries]
      properties:
        code:
          type: string
        name:
          type: string
        timeSeries:
          type: array
          items:
            $ref: '#/components/schemas/TemperatureTimeSeriesEntry'
    TemperatureTimeSeriesEntry:
      type: object
      required: [time]
      properties:
        time:
          type: string
          format: date-time
        temp:
          type: string
          nullable: true
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          $ref: '#/components/schemas/ErrorModel'
    ErrorModel:
      type: object
      required: [code, message, requestId]
      properties:
        code:
          type: string
        message:
          type: string
        requestId:
          type: string
        details:
          type: object
          additionalProperties: true
